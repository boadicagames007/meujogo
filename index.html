<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Dandan Game Studio</title>
    <script src="https://pygame-web.github.io/archives/0.8/pygbag.js"></script>
</head>
<body style="margin:0; background:black; color:white;">
    <div id="game"></div>
    <script>
        window.onload = function() {
            // O comando abaixo força o Pygbag a procurar o arquivo main.py na raiz
            Pygbag.start("game", "main.py");
        };
    </script>
</body>
</html>
